<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 330" width="840" height="330" role="img" aria-labelledby="title">
  <title id="title">Core features</title>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7fbf9"/><stop offset="1" stop-color="#fff9e9"/></linearGradient></defs>
  <rect width="840" height="330" rx="16" fill="url(#bg)" stroke="#d6e3dc"/>
  <g font-family="'Segoe UI', Arial, sans-serif">
    <text x="38" y="45" fill="#8b5d0c" font-size="14" font-weight="700" letter-spacing="2">BUILT AROUND THE REAL CONSTRAINTS</text>
    <g transform="translate(38 70)"><rect width="368" height="100" rx="12" fill="#edf8f2" stroke="#9fcbb4"/><rect x="18" y="18" width="34" height="34" rx="8" fill="#d6f0e1"/><path d="M27 30h16v11H27zM30 27h10" fill="none" stroke="#087348" stroke-width="2"/><text x="67" y="38" fill="#18372a" font-size="18" font-weight="700">Native Windows UI</text><text x="67" y="64" fill="#4d685c" font-size="13">WPF app with no browser runtime.</text></g>
    <g transform="translate(434 70)"><rect width="368" height="100" rx="12" fill="#edf8f2" stroke="#9fcbb4"/><rect x="18" y="18" width="34" height="34" rx="8" fill="#d6f0e1"/><path d="M26 35h18M35 26v18M29 29l12 12M41 29L29 41" stroke="#087348" stroke-width="2"/><text x="67" y="38" fill="#18372a" font-size="18" font-weight="700">CUDA Search</text><text x="67" y="64" fill="#4d685c" font-size="13">Persistent GPU scoring for layer fitting.</text></g>
    <g transform="translate(38 194)"><rect width="368" height="100" rx="12" fill="#fff8e6" stroke="#dbc47f"/><rect x="18" y="18" width="34" height="34" rx="8" fill="#f9e8b7"/><path d="M35 25c9 11 11 15 11 20a11 11 0 1 1-22 0c0-5 3-10 11-20z" fill="none" stroke="#8b5d0c" stroke-width="2"/><text x="67" y="38" fill="#48350e" font-size="18" font-weight="700">Alpha-Aware</text><text x="67" y="64" fill="#725f31" font-size="13">Transparent sources stay transparent.</text></g>
    <g transform="translate(434 194)"><rect width="368" height="100" rx="12" fill="#fff8e6" stroke="#dbc47f"/><rect x="18" y="18" width="34" height="34" rx="8" fill="#f9e8b7"/><path d="M26 27h18v18H26zM30 31h10v10H30z" fill="none" stroke="#8b5d0c" stroke-width="2"/><text x="67" y="38" fill="#48350e" font-size="18" font-weight="700">Three Pipelines</text><text x="67" y="64" fill="#725f31" font-size="13">Compare pixel, perceptual, and catalog fits.</text></g>
  </g>
