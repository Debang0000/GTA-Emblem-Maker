<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 190" width="840" height="190" role="img" aria-labelledby="title">
  <title id="title">Four-step emblem workflow</title>
  <rect x="0.5" y="0.5" width="839" height="189" rx="16" fill="#f8fbf9" stroke="#d6e3dc"/>
  <path d="M105 78H735" stroke="#9fcbb4" stroke-width="2" stroke-dasharray="5 8"><animate attributeName="stroke-dashoffset" values="26;0" dur="2s" repeatCount="indefinite"/></path>
  <g font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
    <g transform="translate(105 78)"><circle r="31" fill="#e3f5eb" stroke="#0a9b60" stroke-width="2"/><text y="7" fill="#087348" font-size="20" font-weight="800">01</text><text y="64" fill="#18372a" font-size="15" font-weight="700">NORMALIZE</text><text y="85" fill="#587064" font-size="12">512 × 512 RGBA</text></g>
    <g transform="translate(315 78)"><circle r="31" fill="#e3f5eb" stroke="#0a9b60" stroke-width="2"/><text y="7" fill="#087348" font-size="20" font-weight="800">02</text><text y="64" fill="#18372a" font-size="15" font-weight="700">FIT</text><text y="85" fill="#587064" font-size="12">CUDA layer search</text></g>
    <g transform="translate(525 78)"><circle r="31" fill="#fff2ca" stroke="#b77b14" stroke-width="2"/><text y="7" fill="#8b5d0c" font-size="20" font-weight="800">03</text><text y="64" fill="#48350e" font-size="15" font-weight="700">COMPARE</text><text y="85" fill="#725f31" font-size="12">Choose the best result</text></g>
    <g transform="translate(735 78)"><circle r="31" fill="#fff2ca" stroke="#b77b14" stroke-width="2"/><text y="7" fill="#8b5d0c" font-size="20" font-weight="800">04</text><text y="64" fill="#48350e" font-size="15" font-weight="700">COPY</text><text y="85" fill="#725f31" font-size="12">Rockstar payload</text></g>
  </g>
